name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p dist

          GOOS=linux   GOARCH=amd64 go build -o dist/loglint-linux-amd64        .
          GOOS=linux   GOARCH=arm64 go build -o dist/loglint-linux-arm64        .
          GOOS=darwin  GOARCH=amd64 go build -o dist/loglint-darwin-amd64       .
          GOOS=darwin  GOARCH=arm64 go build -o dist/loglint-darwin-arm64       .
          GOOS=windows GOARCH=amd64 go build -o dist/loglint-windows-amd64.exe .

      - name: Package archives
        working-directory: dist
        run: |
          tar czf loglint-linux-amd64.tar.gz   loglint-linux-amd64
          tar czf loglint-linux-arm64.tar.gz   loglint-linux-arm64
          tar czf loglint-darwin-amd64.tar.gz  loglint-darwin-amd64
          tar czf loglint-darwin-arm64.tar.gz  loglint-darwin-arm64
          zip     loglint-windows-amd64.zip    loglint-windows-amd64.exe

          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/loglint-linux-amd64.tar.gz
            dist/loglint-linux-arm64.tar.gz
            dist/loglint-darwin-amd64.tar.gz
            dist/loglint-darwin-arm64.tar.gz
            dist/loglint-windows-amd64.zip
            dist/checksums.txt
